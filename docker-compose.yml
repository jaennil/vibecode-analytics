services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      BIND_ALL: "1"
      PORT: "8787"
      DB_PATH: /app/data/usage.db
      HISTORY_FILE: /app/data/usage-history.jsonl
      CODEX_HOME: /host-home/.codex
      CLAUDE_CONFIG_DIR: /host-home/.config/claude,/host-home/.claude
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ${HOME}:/host-home:ro
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/api/v2/health"]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 5s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_PROXY_TARGET: http://api:8787
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
