services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      BIND_ALL: "1"
      PORT: "8787"
      DB_PATH: /app/data/usage.db
      HISTORY_FILE: /app/data/usage-history.jsonl
      CODEX_HOME: /host-home/.codex
      CLAUDE_CONFIG_DIR: /host-home/.config/claude,/host-home/.claude
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ${HOME}:/host-home:ro
    ports:
      - "8787:8787"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_PROXY_TARGET: http://api:8787
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
