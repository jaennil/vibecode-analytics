<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Live Token Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Live Token Monitor</h1>
          <p id="subtitle">Reading Claude Code and Codex logs locally</p>
        </div>
        <div class="status">
          <span id="updated">waiting</span>
          <span id="health" class="pill">offline</span>
        </div>
      </header>

      <section class="metrics" aria-label="summary">
        <div class="metric">
          <span class="label help-label" tabindex="0" data-tooltip="Total context used in the latest turn, including reused cache.">Last Turn</span>
          <strong id="lastTotal">0</strong>
          <span id="lastSource">no data</span>
        </div>
        <div class="metric">
          <span class="label help-label" tabindex="0" data-tooltip="Tokens added by this turn: fresh input, cache write, output and reasoning. Use this to spot expensive prompts.">New Tokens</span>
          <strong id="lastInput">0</strong>
          <span>fresh + cache write + output</span>
        </div>
        <div class="metric">
          <span class="label help-label" tabindex="0" data-tooltip="Tokens generated in the assistant answer. Long answers increase this number.">Output</span>
          <strong id="lastOutput">0</strong>
          <span>answer tokens</span>
        </div>
        <div class="metric warn">
          <span class="label help-label" tabindex="0" data-tooltip="Largest new-token event currently visible after applying filters.">Spike</span>
          <strong id="spike">0</strong>
          <span id="spikeLabel">max turn</span>
        </div>
      </section>

      <section class="filters" aria-label="filters">
        <label>
          <span>Range</span>
          <select id="rangeFilter">
            <option value="24h">Last 24h</option>
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
            <option value="all">Stored history</option>
            <option value="live">Live tail</option>
          </select>
        </label>
        <label>
          <span>Source</span>
          <select id="sourceFilter">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          <span>Project</span>
          <select id="projectFilter">
            <option value="all">All projects</option>
          </select>
        </label>
        <label>
          <span>Search charts</span>
          <input id="projectSearch" type="search" placeholder="project name or path">
        </label>
        <div id="filterMeta" class="filter-meta">0 events</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="help-label" tabindex="0" data-tooltip="Daily totals help compare today against previous days in the selected range and project filter.">Daily trend</h2>
          <div class="legend">
            <span class="help-label" tabindex="0" data-tooltip="Sum of new tokens for that day after filters."><i class="bar"></i>daily total</span>
            <span class="help-label" tabindex="0" data-tooltip="Average new tokens per model call for that day."><i class="line"></i>avg per call</span>
          </div>
        </div>
        <div id="dailyChart" class="token-chart trend-chart"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="help-label" tabindex="0" data-tooltip="Each line shows how many new tokens were added by every turn in one project. Hover a point for exact values.">New tokens by project</h2>
          <div class="legend">
            <span class="help-label" tabindex="0" data-tooltip="Fresh input + cache write + output + reasoning. Cache reads are excluded because they are reused tokens."><i class="line"></i>new tokens</span>
            <span class="help-label" tabindex="0" data-tooltip="User prompt markers show where a human message was logged. One prompt can create many model calls after it."><i class="prompt-dot"></i>prompt</span>
            <span class="help-label" tabindex="0" data-tooltip="The largest new-token event on the project chart."><i class="spike-dot"></i>spike</span>
          </div>
        </div>
        <div class="project-pager">
          <span id="projectPageMeta">0 projects</span>
          <div>
            <button id="prevProjects" class="icon-button" type="button">Prev</button>
            <button id="nextProjects" class="icon-button" type="button">Next</button>
          </div>
        </div>
        <div id="projectCharts" class="project-charts"></div>
      </section>

    </main>

    <div id="chartModal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <h2 id="modalTitle">Project</h2>
            <p id="modalSubtitle"></p>
          </div>
          <button id="modalClose" class="icon-button" type="button" aria-label="Close full screen chart">Close</button>
        </div>
        <div id="modalRange" class="modal-range" aria-label="Detailed chart range">
          <div class="range-group">
            <label class="modal-filter">
              <span class="range-label">Time</span>
              <select id="modalTimeFilter" class="modal-select">
                <option value="all">All</option>
                <option value="5m">Last 5m</option>
                <option value="10m">Last 10m</option>
                <option value="1h">Last 1h</option>
                <option value="6h">Last 6h</option>
                <option value="24h">Last 24h</option>
              </select>
            </label>
          </div>
          <div class="range-group">
            <label class="modal-filter">
              <span class="range-label">Prompts</span>
              <select id="modalPromptFilter" class="modal-select">
                <option value="">None</option>
                <option value="p1">Last prompt</option>
                <option value="p2">Last 2 prompts</option>
                <option value="p3">Last 3 prompts</option>
                <option value="p5">Last 5 prompts</option>
                <option value="p10">Last 10 prompts</option>
              </select>
            </label>
          </div>
          <div class="range-group">
            <button id="modalSumToggle" class="range-button sum-button" type="button">SUM</button>
          </div>
        </div>
        <div id="modalSum" class="modal-sum" hidden></div>
        <div id="modalChart" class="token-chart token-chart-large"></div>
        <div id="modalStats" class="modal-stats"></div>
      </div>
    </div>

    <script src="/vendor/echarts.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
